env:
  TERM: "xterm-256color"

window:
  dimensions:
    columns: 108
    lines: 36

font:
  normal:
    family: "JetBrainsMono Nerd Font"
  bold:
    family: "JetBrainsMono Nerd Font"
  italic: 
    family: "JetBrainsMono Nerd Font"
  bold_italic:
    family: "JetBrainsMono Nerd Font"
  size: 24

  key_bindings:
    - { key: Left, mods: Alt, chars: "\x1bb" }
    - { key: Right, mods: Alt, chars: "\x1b" }
